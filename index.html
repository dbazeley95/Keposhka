<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keposhka Creator & Studio</title>
    <style>
        :root {
            --bg-dark: #0c0c0c;
            --bg-panel: #161616;
            --bg-input: #1f1f1f;
            --accent: #ff2a2a;
            --text-main: #e0e0e0;
            --text-muted: #888;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .container { 
            background-color: var(--bg-panel); 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            max-width: 1200px; 
            width: 100%; 
            border-top: 5px solid var(--accent); 
            display: flex;
            flex-direction: column;
        }
        
        h1 { 
            color: var(--accent); 
            margin: 0 0 5px 0; 
            font-size: 28px; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            text-align: center; 
        }
        
        .subtitle { 
            color: var(--text-muted); 
            font-size: 13px; 
            margin-bottom: 30px; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 800px) {
            .workspace {
                grid-template-columns: 250px 1fr;
            }
        }
        
        .controls { 
            background-color: var(--bg-input); 
            padding: 20px; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label { 
            font-size: 12px; 
            color: #b3b3b3; 
            text-transform: uppercase; 
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        input[type="color"] {
            width: 100%; 
            height: 40px; 
            border: none; 
            background: none; 
            cursor: pointer;
        }

        input[type="range"] { 
            accent-color: var(--accent); 
            width: 100%;
        }
        
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        textarea { 
            width: 100%; 
            height: 100px; 
            background-color: var(--bg-input); 
            border: 1px solid #333; 
            color: #fff; 
            padding: 15px; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .output-wrapper { 
            background-color: #000; 
            padding: 25px; 
            border-radius: 8px; 
            width: 100%; 
            box-sizing: border-box; 
            border: 2px solid #222;
        }
        
        canvas { 
            display: block; 
            width: 100%; 
        }
        
        .btn-download { 
            background-color: var(--accent); 
            color: white; 
            border: none; 
            padding: 16px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 15px;
            text-transform: uppercase; 
            letter-spacing: 1px;
            border-radius: 6px; 
            cursor: pointer; 
            transition: background 0.2s, transform 0.1s;
        }
        
        .btn-download:hover { background-color: #e01b1b; }
        .btn-download:active { transform: scale(0.99); }
        
        .footer { 
            margin-top: 30px; 
            text-align: center; 
            font-size: 11px; 
            color: #555; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
    </style>
</head>
<body>
<div class="container">
    <div>
        <h1>Keposhka Creator & Studio</h1>
        <div class="subtitle">The Official Tooling of Draag</div>
    </div>
    
    <div class="workspace">
        <div class="controls">
            <div class="control-group">
                <label>Ink Color</label>
                <input type="color" id="inkColor" value="#ff2a2a">
            </div>
            <div class="control-group">
                <label>Glyph Size</label>
                <input type="range" id="scale" min="15" max="60" value="35">
            </div>
            <div class="control-group">
                <label>Line Weight</label>
                <input type="range" id="weight" min="5" max="25" value="15">
            </div>
        </div>
        
        <div class="main-panel">
            <textarea id="englishInput" placeholder="Enter translation here...">LONG LIVE THE BLACK PARADE</textarea>
            
            <div class="output-wrapper" id="canvasContainer">
                <canvas id="studioCanvas"></canvas>
            </div>
            
            <button class="btn-download" id="downloadBtn">💾 Export Graphic (PNG)</button>
        </div>
    </div>
    
    <div class="footer">Na Na Na Na Na Version 2.0</div>
</div>

<script>
    const input = document.getElementById('englishInput');
    const canvas = document.getElementById('studioCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvasContainer');
    const scaleInput = document.getElementById('scale');
    const weightInput = document.getElementById('weight');
    const colorInput = document.getElementById('inkColor');
    
    // Accurate glyph paths mapped from the hand-drawn reference image
    const glyphs = {
        'A': (c,x,y,w,h) => { c.moveTo(x+w/2,y); c.lineTo(x+w,y+h); c.moveTo(x+w/2,y); c.lineTo(x,y+h); c.moveTo(x+w*0.75,y+h/2); c.lineTo(x-w*0.25,y+h/2); },
        'B': (c,x,y,w,h) => { c.moveTo(x,y+h); c.lineTo(x,y); c.lineTo(x+w,y+h); c.lineTo(x+w,y); },
        'C': (c,x,y,w,h) => { c.moveTo(x+w,y); c.lineTo(x,y); c.lineTo(x,y+h); c.lineTo(x+w,y+h); c.moveTo(x,y+h/2); c.lineTo(x+w*0.8,y+h/2); },
        'D': (c,x,y,w,h) => { c.rect(x,y,w,h*0.7); c.moveTo(x,y+h*0.7); c.lineTo(x,y+h); c.moveTo(x,y+h*0.35); c.lineTo(x+w,y+h*0.35); },
        'E': (c,x,y,w,h) => { c.moveTo(x,y); c.lineTo(x+w,y); c.lineTo(x+w,y+h); c.lineTo(x,y+h); c.moveTo(x+w,y+h/2); c.lineTo(x+w*0.2,y+h/2); },
        'F': (c,x,y,w,h) => { c.moveTo(x,y); c.lineTo(x+w,y); c.moveTo(x+w/2,y); c.lineTo(x+w/2,y+h); c.moveTo(x+w*0.2,y+h/2); c.lineTo(x+w*0.8,y+h/2); },
        'G': (c,x,y,w,h) => { c.moveTo(x,y); c.lineTo(x+w,y); c.lineTo(x,y+h); c.lineTo(x+w,y+h); },
        'H': (c,x,y,w,h) => { c.moveTo(x+w/2,y); c.lineTo(x,y+h); c.lineTo(x+w,y+h); c.closePath(); },
        'I': (c,x,y,w,h) => { c.moveTo(x+w/2,y); c.lineTo(x,y+h); c.moveTo(x+w/2,y); c.lineTo(x+w,y+h); },
        'J': (c,x,y,w,h) => { c.moveTo(x,y); c.lineTo(x+w/2,y+h/2); c.lineTo(x+w,y); c.moveTo(x+w/2,y+h/2); c.lineTo(x+w/2,y+h); },
        'K': (c,x,y,w,h) => { c.moveTo(x,y+h); c.lineTo(x,y); c.lineTo(x+w/2,y+h/2); c.lineTo(x+w,y); c.lineTo(x+w,y+h); },
        'L': (c,x,y,w,h) => { c.arc(x+w/2,y+h/2,w/2,0,Math.PI*2); c.moveTo(x+w/2,y-h*0.1); c.lineTo(x+w/2,y+h*1.1); },
        'M': (c,x,y,w,h) => { c.moveTo(x+w,y); c.lineTo(x+w,y+h); c.moveTo(x+w,y); c.lineTo(x,y+h/2); c.lineTo(x+w,y+h); },
        'N': (c,x,y,w,h) => { c.moveTo(x,y); c.lineTo(x+w,y); c.moveTo(x,y+h); c.lineTo(x+w,y+h); c.moveTo(x,y); c.lineTo(x+w,y+h); c.moveTo(x+w,y); c.lineTo(x,y+h); },
        'O': (c,x,y,w,h) => { c.moveTo(x,y); c.lineTo(x,y+h); c.lineTo(x+w,y+h); c.lineTo(x+w,y); },
        'P': (c,x,y,w,h) => { c.moveTo(x,y); c.lineTo(x+w*0.25,y+h); c.lineTo(x+w*0.5,y+h/2); c.lineTo(x+w*0.75,y+h); c.lineTo(x+w,y); },
        'Q': (c,x,y,w,h) => { c.arc(x+w/2,y+h/2,w/2,0,Math.PI*2); },
        'R': (c,x,y,w,h) => { c.moveTo(x+w,y); c.lineTo(x,y); c.lineTo(x,y+h); c.moveTo(x+w,y+h/2); c.lineTo(x,y+h/2); }, // Fallback from previous version
        'S': (c,x,y,w,h) => { c.moveTo(x,y+h); c.lineTo(x,y); c.lineTo(x+w,y); c.lineTo(x+w,y+h); c.moveTo(x+w/2,y); c.lineTo(x+w/2,y+h); },
        'T': (c,x,y,w,h) => { c.moveTo(x+w,y); c.lineTo(x,y); c.lineTo(x+w/2,y+h/2); c.lineTo(x,y+h); c.lineTo(x+w,y+h); },
        'U': (c,x,y,w,h) => { c.moveTo(x,y+h); c.lineTo(x+w/2,y); c.lineTo(x+w,y+h); c.moveTo(x+w*0.25,y+h/2); c.lineTo(x+w*0.75,y+h/2); },
        'V': (c,x,y,w,h) => { c.moveTo(x,y); c.lineTo(x,y+h); c.moveTo(x+w,y); c.lineTo(x+w,y+h); c.moveTo(x,y+h/2); c.lineTo(x+w,y+h/2); },
        'W': (c,x,y,w,h) => { c.moveTo(x,y); c.lineTo(x,y+h); c.lineTo(x+w*0.7,y+h); c.lineTo(x+w,y+h*0.75); c.lineTo(x+w*0.7,y+h*0.5); c.lineTo(x,y+h*0.5); c.moveTo(x+w*0.7,y+h*0.5); c.lineTo(x+w,y+h*0.25); c.lineTo(x+w*0.7,y); c.lineTo(x,y); },
        'X': (c,x,y,w,h) => { c.moveTo(x+w,y); c.lineTo(x+w,y+h); c.lineTo(x,y+h); c.lineTo(x,y+h*0.5); },
        'Y': (c,x,y,w,h) => { c.moveTo(x,y); c.lineTo(x,y+h); c.lineTo(x+w,y+h); },
        'Z': (c,x,y,w,h) => { c.rect(x,y,w/2,h/2); c.moveTo(x+w/2,y); c.lineTo(x+w/2,y+h); },
        '1': (c,x,y,w,h) => { c.moveTo(x+w*0.2,y+h*0.2); c.lineTo(x+w/2,y); c.lineTo(x+w/2,y+h); c.moveTo(x+w*0.2,y+h); c.lineTo(x+w*0.8,y+h); },
        '2': (c,x,y,w,h) => { c.moveTo(x,y+h*0.2); c.lineTo(x+w/2,y); c.lineTo(x+w,y+h*0.2); c.lineTo(x,y+h); c.lineTo(x+w,y+h); },
        '3': (c,x,y,w,h) => { c.moveTo(x,y); c.lineTo(x+w,y); c.lineTo(x+w/2,y+h/2); c.lineTo(x+w,y+h); c.lineTo(x,y+h); },
        '4': (c,x,y,w,h) => { c.moveTo(x+w*0.8,y+h); c.lineTo(x+w*0.8,y); c.lineTo(x,y+h*0.6); c.lineTo(x+w,y+h*0.6); },
        '5': (c,x,y,w,h) => { c.moveTo(x+w,y); c.lineTo(x,y); c.lineTo(x,y+h*0.4); c.lineTo(x+w*0.8,y+h*0.4); c.lineTo(x+w,y+h*0.7); c.lineTo(x+w*0.5,y+h); c.lineTo(x,y+h*0.8); },
        '6': (c,x,y,w,h) => { c.moveTo(x+w,y); c.lineTo(x,y+h*0.5); c.lineTo(x,y+h); c.lineTo(x+w,y+h); c.lineTo(x+w,y+h*0.5); c.lineTo(x,y+h*0.5); },
        '7': (c,x,y,w,h) => { c.moveTo(x,y); c.lineTo(x+w,y); c.lineTo(x+w*0.3,y+h); },
        '8': (c,x,y,w,h) => { c.rect(x,y,w,h/2); c.rect(x,y+h/2,w,h/2); },
        '9': (c,x,y,w,h) => { c.moveTo(x,y+h); c.lineTo(x+w,y+h*0.5); c.lineTo(x+w,y); c.lineTo(x,y); c.lineTo(x,y+h*0.5); c.lineTo(x+w,y+h*0.5); },
        '0': (c,x,y,w,h) => { c.moveTo(x+w/2,y); c.lineTo(x+w,y+h/2); c.lineTo(x+w/2,y+h); c.lineTo(x,y+h/2); c.closePath(); }
    };

    function renderStudio() {
        const text = input.value.toUpperCase();
        const scale = parseInt(scaleInput.value);
        const w = scale;
        const h = scale * 1.2; // Rectangular proportion matching drawing
        const spacing = w * 0.5; // Space between letters
        const padding = 20;
        
        // 1. Dynamic Width
        const availableWidth = wrapper.clientWidth - (padding * 2);
        canvas.width = availableWidth;

        // 2. Wrap Calculation
        let simX = 0, simY = 0;
        let words = text.split(' ');
        
        for (let word of words) {
            let wordWidth = (word.length * w) + ((word.length - 1) * spacing);
            
            // Break word onto new line if it doesn't fit
            if (simX + wordWidth > availableWidth && simX > 0) {
                simX = 0;
                simY += h * 1.8; // Line height
            }
            
            // Very long word fallback (breaks characters)
            if (wordWidth > availableWidth) {
                for(let char of word) {
                    if(simX + w > availableWidth) {
                        simX = 0;
                        simY += h * 1.8;
                    }
                    simX += w + spacing;
                }
            } else {
                simX += wordWidth + (w * 0.8); // Add space width
            }
        }
        
        // 3. Dynamic Height
        canvas.height = simY + (h * 1.5) + (padding * 2);

        // 4. Draw
        ctx.fillStyle = '#000'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = colorInput.value;
        ctx.lineWidth = scale * (parseInt(weightInput.value) / 100); 
        ctx.lineCap = 'square';
        ctx.lineJoin = 'miter';
        
        let curX = 0, curY = padding;
        
        for (let word of words) {
            let wordWidth = (word.length * w) + ((word.length - 1) * spacing);
            
            if (curX + wordWidth > availableWidth && curX > 0) {
                curX = 0;
                curY += h * 1.8;
            }
            
            for (let char of word) {
                if (curX + w > availableWidth) {
                    curX = 0;
                    curY += h * 1.8;
                }

                if (glyphs[char]) {
                    ctx.beginPath();
                    glyphs[char](ctx, curX + padding, curY, w, h);
                    ctx.stroke();
                } else if (char.match(/[A-Z0-9]/)) {
                    // Fallback for missing characters
                    ctx.font = `bold ${h}px sans-serif`;
                    ctx.fillStyle = colorInput.value;
                    ctx.fillText(char, curX + padding, curY + h);
                }
                curX += w + spacing;
            }
            curX += w * 0.5; // Space character width
        }
    }

    // Real-time listeners
    ['input', 'change'].forEach(evt => {
        document.body.addEventListener(evt, renderStudio);
    });
    window.addEventListener('resize', renderStudio);
    
    // Download
    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a'); 
        link.download = 'keposhka-translation.png'; 
        link.href = canvas.toDataURL('image/png'); 
        link.click();
    };
    
    // Init
    setTimeout(renderStudio, 50); 
</script>
</body>
</html>
