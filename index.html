<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keposhka Creator & Studio</title>
    <style>
        /* Load your custom font! */
        @font-face {
            font-family: 'Keposhka';
            src: url('keposhka.ttf') format('truetype');
        }

        :root {
            --bg-dark: #0c0c0c;
            --bg-panel: #161616;
            --bg-input: #1f1f1f;
            --accent: #ff2a2a;
            --text-main: #e0e0e0;
            --text-muted: #888;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .container { 
            background-color: var(--bg-panel); 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            max-width: 1200px; 
            width: 100%; 
            border-top: 5px solid var(--accent); 
            display: flex;
            flex-direction: column;
        }
        
        h1 { 
            color: var(--accent); 
            margin: 0 0 5px 0; 
            font-size: 28px; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            text-align: center; 
        }
        
        .subtitle { 
            color: var(--text-muted); 
            font-size: 13px; 
            margin-bottom: 30px; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 800px) {
            .workspace {
                grid-template-columns: 250px 1fr;
            }
        }
        
        .controls { 
            background-color: var(--bg-input); 
            padding: 20px; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label { 
            font-size: 12px; 
            color: #b3b3b3; 
            text-transform: uppercase; 
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        input[type="color"] {
            width: 100%; 
            height: 40px; 
            border: none; 
            background: none; 
            cursor: pointer;
        }

        input[type="range"] { 
            accent-color: var(--accent); 
            width: 100%;
        }
        
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        textarea { 
            width: 100%; 
            height: 100px; 
            background-color: var(--bg-input); 
            border: 1px solid #333; 
            color: #fff; 
            padding: 15px; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .output-wrapper { 
            background-color: #000; 
            padding: 25px; 
            border-radius: 8px; 
            width: 100%; 
            box-sizing: border-box; 
            border: 2px solid #222;
        }
        
        canvas { 
            display: block; 
            width: 100%; 
        }
        
        .btn-download { 
            background-color: var(--accent); 
            color: white; 
            border: none; 
            padding: 16px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 15px;
            text-transform: uppercase; 
            letter-spacing: 1px;
            border-radius: 6px; 
            cursor: pointer; 
            transition: background 0.2s, transform 0.1s;
        }
        
        .btn-download:hover { background-color: #e01b1b; }
        .btn-download:active { transform: scale(0.99); }
        
        .footer { 
            margin-top: 30px; 
            text-align: center; 
            font-size: 11px; 
            color: #555; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
    </style>
</head>
<body>
<div class="container">
    <div>
        <h1>Keposhka Creator & Studio</h1>
        <div class="subtitle">The Official Tooling of Draag</div>
    </div>
    
    <div class="workspace">
        <div class="controls">
            <div class="control-group">
                <label>Ink Color</label>
                <input type="color" id="inkColor" value="#ff2a2a">
            </div>
            <div class="control-group">
                <label>Font Size</label>
                <input type="range" id="scale" min="20" max="100" value="50">
            </div>
            <!-- Line Weight slider removed, as weight is now handled natively by your font! -->
        </div>
        
        <div class="main-panel">
            <textarea id="englishInput" placeholder="Enter translation here...">LONG LIVE THE BLACK PARADE</textarea>
            
            <div class="output-wrapper" id="canvasContainer">
                <canvas id="studioCanvas"></canvas>
            </div>
            
            <button class="btn-download" id="downloadBtn">💾 Export Graphic (PNG)</button>
        </div>
    </div>
    
    <div class="footer">Na Na Na Na Na Version 3.0</div>
</div>

<script>
    const input = document.getElementById('englishInput');
    const canvas = document.getElementById('studioCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvasContainer');
    const scaleInput = document.getElementById('scale');
    const colorInput = document.getElementById('inkColor');

    function renderStudio() {
        const text = input.value.toUpperCase();
        const fontSize = parseInt(scaleInput.value);
        const padding = 20;
        
        // 1. Set canvas width dynamically to fit the screen
        const availableWidth = wrapper.clientWidth - (padding * 2);
        canvas.width = availableWidth;

        // Apply font early to measure text correctly
        ctx.font = `${fontSize}px Keposhka, sans-serif`;
        
        // 2. Word wrapping logic (Native canvas text measurement)
        const words = text.split(' ');
        let lines = [];
        let currentLine = '';

        for (let i = 0; i < words.length; i++) {
            let testLine = currentLine + words[i] + ' ';
            let metrics = ctx.measureText(testLine);
            let testWidth = metrics.width;
            
            if (testWidth > availableWidth && i > 0) {
                lines.push(currentLine);
                currentLine = words[i] + ' ';
            } else {
                currentLine = testLine;
            }
        }
        lines.push(currentLine); // Push the final line

        // 3. Set dynamic height based on the number of wrapped lines
        const lineHeight = fontSize * 1.2;
        canvas.height = (lines.length * lineHeight) + (padding * 2);

        // 4. Final Render
        ctx.fillStyle = '#000'; // Black background
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Setting canvas dimensions resets context, so re-apply font and color
        ctx.font = `${fontSize}px Keposhka, sans-serif`;
        ctx.textBaseline = 'top';
        ctx.fillStyle = colorInput.value; // Text color

        let curY = padding;
        for (let line of lines) {
            ctx.fillText(line, padding, curY);
            curY += lineHeight;
        }
    }

    // Wait for the custom font to load before drawing the canvas for the first time
    document.fonts.ready.then(() => {
        renderStudio();
    });

    // Real-time update listeners
    ['input', 'change'].forEach(evt => {
        document.body.addEventListener(evt, renderStudio);
    });
    window.addEventListener('resize', renderStudio);
    
    // Download logic
    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a'); 
        link.download = 'keposhka-translation.png'; 
        link.href = canvas.toDataURL('image/png'); 
        link.click();
    };
</script>
</body>
</html>
