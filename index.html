<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keposhka Creator & Studio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0c0c0c; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #161616; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.7); max-width: 800px; width: 100%; border-top: 5px solid #ff2a2a; }
        h1 { color: #ff2a2a; margin: 0 0 5px 0; font-size: 26px; letter-spacing: 3px; text-transform: uppercase; text-align: center; }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 25px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .controls { background-color: #1f1f1f; padding: 20px; border-radius: 8px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; background-color: #1f1f1f; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        .output-container { background-color: #000; padding: 20px; border-radius: 8px; display: flex; justify-content: center; }
        canvas { max-width: 100%; background-color: #000; }
        .btn-download { background-color: #ff2a2a; color: white; border: none; padding: 12px; width: 100%; font-weight: bold; text-transform: uppercase; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .footer { margin-top: 20px; text-align: center; font-size: 10px; color: #555; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="container">
    <h1>Keposhka Creator & Studio</h1>
    <div class="controls">
        <label>Ink Color</label><input type="color" id="inkColor" value="#ff2a2a">
        <label>Glyph Size</label><input type="range" id="scale" min="20" max="60" value="40">
    </div>
    <textarea id="englishInput">ASHTON AND DANIEL</textarea>
    <div class="output-container">
        <canvas id="studioCanvas" width="700" height="250"></canvas>
    </div>
    <button class="btn-download" id="downloadBtn">💾 Export Graphic (PNG)</button>
    <div class="footer">Na Na Na Na Na version 0.5</div>
</div>

<script>
    const input = document.getElementById('englishInput');
    const canvas = document.getElementById('studioCanvas');
    const ctx = canvas.getContext('2d');
    
    const glyphs = {
        'A': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x+w*0.8, y, w*0.2, h); c.fillRect(x, y, w, h*0.2); c.fillRect(x, y+h*0.4, w, h*0.2); },
        'B': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x+w*0.8, y, w*0.2, h); c.fillRect(x, y, w*0.8, h*0.2); c.fillRect(x, y+h*0.4, w*0.8, h*0.2); c.fillRect(x, y+h*0.8, w*0.8, h*0.2); },
        'C': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x, y, w, h*0.2); c.fillRect(x, y+h*0.8, w, h*0.2); },
        'D': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x+w*0.8, y, w*0.2, h); c.fillRect(x, y, w*0.8, h*0.2); c.fillRect(x, y+h*0.8, w*0.8, h*0.2); },
        'E': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x, y, w, h*0.2); c.fillRect(x, y+h*0.4, w*0.7, h*0.2); c.fillRect(x, y+h*0.8, w, h*0.2); },
        'F': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x, y, w, h*0.2); c.fillRect(x, y+h*0.4, w*0.7, h*0.2); },
        'G': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x, y, w, h*0.2); c.fillRect(x, y+h*0.8, w, h*0.2); c.fillRect(x+w*0.8, y+h*0.4, w*0.2, h*0.6); c.fillRect(x+w*0.5, y+h*0.4, w*0.5, h*0.2); },
        'H': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x+w*0.8, y, w*0.2, h); c.fillRect(x, y+h*0.4, w, h*0.2); },
        'I': (c, x, y, w, h) => { c.fillRect(x+w*0.4, y, w*0.2, h); c.fillRect(x, y, w, h*0.2); c.fillRect(x, y+h*0.8, w, h*0.2); },
        'J': (c, x, y, w, h) => { c.fillRect(x+w*0.8, y, w*0.2, h*0.8); c.fillRect(x, y+h*0.8, w*0.8, h*0.2); c.fillRect(x, y+h*0.4, w*0.2, h*0.4); },
        'K': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x+w*0.2, y+h*0.4, w*0.2, h*0.2); c.fillRect(x+w*0.4, y+h*0.2, w*0.2, h*0.2); c.fillRect(x+w*0.4, y+h*0.6, w*0.2, h*0.2); c.fillRect(x+w*0.6, y, w*0.2, h*0.2); c.fillRect(x+w*0.6, y+h*0.8, w*0.2, h*0.2); },
        'L': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x, y+h*0.8, w, h*0.2); },
        'M': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x+w*0.8, y, w*0.2, h); c.fillRect(x+w*0.3, y+h*0.2, w*0.2, h*0.2); c.fillRect(x+w*0.5, y+h*0.4, w*0.2, h*0.2); },
        'N': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x+w*0.8, y, w*0.2, h); c.fillRect(x+w*0.2, y+h*0.2, w*0.2, h*0.2); c.fillRect(x+w*0.4, y+h*0.4, w*0.2, h*0.2); c.fillRect(x+w*0.6, y+h*0.6, w*0.2, h*0.2); },
        'O': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x+w*0.8, y, w*0.2, h); c.fillRect(x, y, w, h*0.2); c.fillRect(x, y+h*0.8, w, h*0.2); },
        'P': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x, y, w, h*0.2); c.fillRect(x, y+h*0.4, w, h*0.2); c.fillRect(x+w*0.8, y, w*0.2, h*0.6); },
        'Q': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h*0.8); c.fillRect(x+w*0.8, y, w*0.2, h*0.8); c.fillRect(x, y, w, h*0.2); c.fillRect(x, y+h*0.6, w, h*0.2); c.fillRect(x+w*0.5, y+h*0.6, w*0.5, h*0.4); },
        'R': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x, y, w, h*0.2); c.fillRect(x, y+h*0.4, w, h*0.2); c.fillRect(x+w*0.8, y, w*0.2, h*0.6); c.fillRect(x+w*0.4, y+h*0.6, w*0.6, h*0.4); },
        'S': (c, x, y, w, h) => { c.fillRect(x, y, w, h*0.2); c.fillRect(x, y+h*0.4, w, h*0.2); c.fillRect(x, y+h*0.8, w, h*0.2); c.fillRect(x, y, w*0.2, h*0.6); c.fillRect(x+w*0.8, y+h*0.4, w*0.2, h*0.6); },
        'T': (c, x, y, w, h) => { c.fillRect(x+w*0.4, y, w*0.2, h); c.fillRect(x, y, w, h*0.2); },
        'U': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h*0.8); c.fillRect(x+w*0.8, y, w*0.2, h*0.8); c.fillRect(x, y+h*0.8, w, h*0.2); },
        'V': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h*0.7); c.fillRect(x+w*0.8, y, w*0.2, h*0.7); c.fillRect(x+w*0.2, y+h*0.7, w*0.2, h*0.2); c.fillRect(x+w*0.6, y+h*0.7, w*0.2, h*0.2); c.fillRect(x+w*0.4, y+h*0.8, w*0.2, h*0.2); },
        'W': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h); c.fillRect(x+w*0.8, y, w*0.2, h); c.fillRect(x+w*0.4, y+h*0.6, w*0.2, h*0.4); c.fillRect(x+w*0.2, y+h*0.6, w*0.2, h*0.2); c.fillRect(x+w*0.6, y+h*0.6, w*0.2, h*0.2); },
        'X': (c, x, y, w, h) => { c.fillRect(x, y, w*0.2, h*0.3); c.fillRect(x+w*0.8, y, w*0.2, h*0.3); c.fillRect(x+w*0.3, y+h*0.3, w*0.4, h*0.4); c.fillRect(x, y+h*0.7, w*0.2, h*0.3); c.fillRect(x+w*0.8, y+h*0.7, w*0.2, h*0.3); },
        'Y': (c, x, y, w, h) => { c.fillRect(x+w*0.4, y+h*0.4, w*0.2, h*0.6); c.fillRect(x, y, w*0.2, h*0.4); c.fillRect(x+w*0.8, y, w*0.2, h*0.4); },
        'Z': (c, x, y, w, h) => { c.fillRect(x, y, w, h*0.2); c.fillRect(x, y+h*0.8, w, h*0.2); c.fillRect(x+w*0.7, y, w*0.2, h*0.4); c.fillRect(x+w*0.1, y+h*0.4, w*0.2, h*0.2); c.fillRect(x+w*0.3, y+h*0.6, w*0.2, h*0.2); }
    };

    function renderStudio() {
        const text = input.value.toUpperCase();
        const scale = parseInt(document.getElementById('scale').value);
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = document.getElementById('inkColor').value;
        let curX = 30, curY = 40;
        for (let char of text) {
            if (char === ' ') { curX += scale; continue; }
            if (glyphs[char]) {
                glyphs[char](ctx, curX, curY, scale, scale * 1.5);
                curX += scale + 15;
            }
        }
    }
    document.body.addEventListener('input', renderStudio);
    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a'); link.download = 'keposhka.png'; link.href = canvas.toDataURL('image/png'); link.click();
    };
    renderStudio();
</script>
</body>
</html>
