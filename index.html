<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keposhka Creator & Studio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0c0c0c;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #161616;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
            max-width: 800px;
            width: 100%;
            border-top: 5px solid #ff2a2a;
        }
        h1 {
            color: #ff2a2a;
            margin: 0 0 5px 0;
            font-size: 26px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
        }
        .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 25px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 600px) {
            .workspace {
                grid-template-columns: 250px 1fr;
            }
        }
        .controls {
            background-color: #1f1f1f;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b3b3b3;
        }
        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 4px;
            background: none;
            cursor: pointer;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #ff2a2a;
        }
        textarea {
            width: 100%;
            height: 120px;
            background-color: #1f1f1f;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
        }
        textarea:focus {
            outline: none;
            border-color: #ff2a2a;
        }
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .output-container {
            background-color: #0b0b0b;
            border: 2px solid #222;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: auto;
        }
        canvas {
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            max-width: 100%;
        }
        .btn-download {
            background-color: #ff2a2a;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-download:hover {
            background-color: #e01b1b;
        }
        .btn-download:active {
            transform: scale(0.98);
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Keposhka Creator & Studio</h1>
    <div class="subtitle">The Official Tooling of Draag</div>
    
    <div class="workspace">
        <div class="controls">
            <div class="control-group">
                <label for="bgColor">Background Color</label>
                <input type="color" id="bgColor" value="#0b0b0b">
            </div>
            <div class="control-group">
                <label for="inkColor">Ink Color</label>
                <input type="color" id="inkColor" value="#ff2a2a">
            </div>
            <div class="control-group">
                <label for="lineWidth">Line Weight</label>
                <input type="range" id="lineWidth" min="1" max="8" value="3">
            </div>
            <div class="control-group">
                <label for="scale">Glyph Size</label>
                <input type="range" id="scale" min="15" max="50" value="30">
            </div>
        </div>

        <div class="main-panel">
            <textarea id="englishInput" placeholder="Type your message here to translate..."></textarea>
            
            <div class="output-container">
                <canvas id="studioCanvas" width="500" height="300"></canvas>
            </div>

            <button class="btn-download" id="downloadBtn">
                💾 Export Graphic (PNG)
            </button>
        </div>
    </div>
    <div class="footer">Na Na Na Na Na version 0.3</div>
</div>

<script>
    const input = document.getElementById('englishInput');
    const canvas = document.getElementById('studioCanvas');
    const ctx = canvas.getContext('2d');
    
    const bgColorInput = document.getElementById('bgColor');
    const inkColorInput = document.getElementById('inkColor');
    const lineWidthInput = document.getElementById('lineWidth');
    const scaleInput = document.getElementById('scale');
    const downloadBtn = document.getElementById('downloadBtn');

    input.value = "ASHTON AND DANIEL";

    const glyphs = {
        'A': (c, w, h) => { c.moveTo(0, h); c.lineTo(w/2, 0); c.lineTo(w, h); c.moveTo(w/4, h/2); c.lineTo(w*0.75, h/2); },
        'B': (c, w, h) => { c.fillRect(0, 0, w*0.2, h); c.fillRect(w*0.8, 0, w*0.2, h); c.fillRect(0, 0, w, h*0.15); c.fillRect(0, h*0.45, w*0.8, h*0.15); c.fillRect(0, h*0.85, w, h*0.15); },
        'C': (c, w, h) => { c.fillRect(0, 0, w*0.2, h); c.fillRect(0, 0, w, h*0.15); c.fillRect(0, h*0.85, w, h*0.15); },
        'D': (c, w, h) => { c.fillRect(0, 0, w*0.2, h); c.fillRect(w*0.8, 0, w*0.2, h); c.fillRect(0, 0, w, h*0.15); c.fillRect(0, h*0.85, w, h*0.15); },
        'E': (c, w, h) => { c.fillRect(0, 0, w*0.2, h); c.fillRect(0, 0, w, h*0.15); c.fillRect(0, h*0.45, w*0.7, h*0.15); c.fillRect(0, h*0.85, w, h*0.15); },
        'F': (c, w, h) => { c.fillRect(0, 0, w*0.2, h); c.fillRect(0, 0, w, h*0.15); c.fillRect(0, h*0.45, w*0.7, h*0.15); },
        'G': (c, w, h) => { c.fillRect(0, 0, w*0.2, h); c.fillRect(0, 0, w, h*0.15); c.fillRect(w*0.8, 0, w*0.2, h*0.5); c.fillRect(w*0.4, h*0.45, w*0.6, h*0.15); },
        'H': (c, w, h) => { c.fillRect(0, 0, w*0.2, h); c.fillRect(w*0.8, 0, w*0.2, h); c.fillRect(0, h*0.45, w, h*0.15); },
        'I': (c, w, h) => { c.fillRect(w*0.4, 0, w*0.2, h); c.fillRect(0, 0, w, h*0.15); c.fillRect(0, h*0.85, w, h*0.15); },
        'J': (c, w, h) => { c.fillRect(w*0.8, 0, w*0.2, h*0.8); c.arc(w*0.4, h*0.8, w*0.4, 0, Math.PI); },
        'K': (c, w, h) => { c.fillRect(0, 0, w*0.2, h); c.moveTo(w*0.2, h*0.4); c.lineTo(w, 0); c.moveTo(w*0.2, h*0.4); c.lineTo(w, h); },
        'L': (c, w, h) => { c.fillRect(0, 0, w*0.2, h); c.fillRect(0, h*0.85, w, h*0.15); },
        'M': (c, w, h) => { c.fillRect(0, 0, w*0.2, h); c.fillRect(w*0.8, 0, w*0.2, h); c.moveTo(0, 0); c.lineTo(w/2, h/2); c.lineTo(w, 0); },
        'N': (c, w, h) => { c.fillRect(0, 0, w*0.2, h); c.fillRect(w*0.8, 0, w*0.2, h); c.moveTo(0, 0); c.lineTo(w, h); },
        'O': (c, w, h) => { c.fillRect(0, 0, w*0.2, h); c.fillRect(w*0.8, 0, w*0.2, h); c.fillRect(0, 0, w, h*0.15); c.fillRect(0, h*0.85, w, h*0.15); },
        'P': (c, w, h) => { c.fillRect(0, 0, w*0.2, h); c.fillRect(0, 0, w, h*0.15); c.fillRect(0, h*0.45, w, h*0.15); c.fillRect(w*0.8, 0, w*0.2, h*0.6); },
        'Q': (c, w, h) => { c.arc(w/2, h/2, w*0.4, 0, Math.PI*2); c.moveTo(w*0.6, h*0.6); c.lineTo(w, h); },
        'R': (c, w, h) => { c.fillRect(0, 0, w*0.2, h); c.fillRect(0, 0, w, h*0.15); c.fillRect(0, h*0.45, w, h*0.15); c.fillRect(w*0.8, 0, w*0.2, h*0.6); c.moveTo(w*0.3, h*0.6); c.lineTo(w, h); },
        'S': (c, w, h) => { c.fillRect(0, 0, w, h*0.15); c.fillRect(0, h*0.45, w, h*0.15); c.fillRect(0, h*0.85, w, h*0.15); c.fillRect(0, 0, w*0.2, h*0.5); c.fillRect(w*0.8, h*0.5, w*0.2, h*0.5); },
        'T': (c, w, h) => { c.fillRect(w*0.4, 0, w*0.2, h); c.fillRect(0, 0, w, h*0.15); },
        'U': (c, w, h) => { c.fillRect(0, 0, w*0.2, h*0.8); c.fillRect(w*0.8, 0, w*0.2, h*0.8); c.fillRect(0, h*0.85, w, h*0.15); },
        'V': (c, w, h) => { c.moveTo(0, 0); c.lineTo(w/2, h); c.lineTo(w, 0); },
        'W': (c, w, h) => { c.moveTo(0, 0); c.lineTo(w*0.25, h); c.lineTo(w*0.5, 0); c.lineTo(w*0.75, h); c.lineTo(w, 0); },
        'X': (c, w, h) => { c.moveTo(0, 0); c.lineTo(w, h); c.moveTo(w, 0); c.lineTo(0, h); },
        'Y': (c, w, h) => { c.moveTo(0, 0); c.lineTo(w/2, h/2); c.lineTo(w, 0); c.moveTo(w/2, h/2); c.lineTo(w/2, h); },
        'Z': (c, w, h) => { c.fillRect(0, 0, w, h*0.15); c.fillRect(0, h*0.85, w, h*0.15); c.moveTo(w, 0); c.lineTo(0, h); }
    };

    function renderStudio() {
        const text = input.value.toUpperCase();
        const glyphScale = parseInt(scaleInput.value);
        
        const charW = glyphScale;
        const charH = Math.floor(glyphScale * 1.3);
        const padding = 30;
        const spacingX = Math.floor(charW * 0.25);
        const spacingY = Math.floor(charH * 0.5);

        let lines = [[]];
        let currentLineIdx = 0;
        let testX = padding;

        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            if (char === '\n') {
                lines.push([]);
                currentLineIdx++;
                testX = padding;
                continue;
            }
            
            let increment = (char === ' ') ? charW : (charW + spacingX);
            if (testX + increment > canvas.width - padding && lines[currentLineIdx].length > 0) {
                lines.push([]);
                currentLineIdx++;
                testX = padding;
            }
            lines[currentLineIdx].push(char);
            testX += increment;
        }

        canvas.height = Math.max(200, (lines.length * (charH + spacingY)) - spacingY + (padding * 2));

        ctx.fillStyle = bgColorInput.value;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = inkColorInput.value;
        ctx.fillStyle = inkColorInput.value;
        ctx.lineWidth = parseInt(lineWidthInput.value);
        ctx.lineJoin = 'miter';
        ctx.lineCap = 'square';

        let cursorY = padding;
        lines.forEach(line => {
            let cursorX = padding;
            line.forEach(char => {
                if (char === ' ') {
                    cursorX += charW;
                    return;
                }

                if (glyphs[char]) {
                    ctx.save();
                    ctx.translate(cursorX, cursorY);
                    ctx.beginPath();
                    glyphs[char](ctx, charW, charH);
                    ctx.stroke();
                    ctx.restore();
                } else {
                    ctx.font = `bold ${charH}px sans-serif`;
                    ctx.textBaseline = 'top';
                    ctx.fillText(char, cursorX, cursorY);
                }
                cursorX += charW + spacingX;
            });
            cursorY += charH + spacingY;
        });
    }

    input.addEventListener('input', renderStudio);
    bgColorInput.addEventListener('input', renderStudio);
    inkColorInput.addEventListener('input', renderStudio);
    lineWidthInput.addEventListener('input', renderStudio);
    scaleInput.addEventListener('input', renderStudio);

    downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'keposhka-design.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });

    renderStudio();
</script>

</body>
</html>
