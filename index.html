<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keposhka Creator & Studio</title>
    <style>
        /* Load your custom font! */
        @font-face {
            font-family: 'Keposhka';
            src: url('keposhka.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-dark: #0c0c0c;
            --bg-panel: #161616;
            --bg-input: #1f1f1f;
            --accent: #ff2a2a;
            --text-main: #e0e0e0;
            --text-muted: #888;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .container { 
            background-color: var(--bg-panel); 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            max-width: 1200px; 
            width: 100%; 
            border-top: 5px solid var(--accent); 
            display: flex;
            flex-direction: column;
        }
        
        h1 { 
            font-family: 'Keposhka', 'Segoe UI', sans-serif;
            color: var(--accent); 
            margin: 0 0 5px 0; 
            font-size: 36px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            text-align: center; 
        }
        
        .subtitle { 
            color: var(--text-muted); 
            font-size: 13px; 
            margin-bottom: 30px; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 800px) {
            .workspace {
                grid-template-columns: 280px 1fr;
            }
        }
        
        .controls { 
            background-color: var(--bg-input); 
            padding: 20px; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            align-self: start;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label { 
            font-size: 11px; 
            color: #b3b3b3; 
            text-transform: uppercase; 
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        /* Re-engineered Custom Color Circle Display */
        .color-wheel-box {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-panel);
            border: 1px solid #444;
            padding: 12px;
            border-radius: 6px;
            position: relative;
        }

        .color-circle-preview {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 0 0 2px #000, 0 4px 10px rgba(0,0,0,0.5);
            background-color: #ff2a2a;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .color-circle-preview:active {
            transform: scale(0.95);
        }

        #inkColor {
            position: absolute;
            opacity: 0;
            width: 40px;
            height: 40px;
            cursor: pointer;
            z-index: 2;
        }

        input[type="range"] { 
            accent-color: var(--accent); 
            width: 100%;
        }

        select {
            background-color: var(--bg-panel);
            color: #fff;
            border: 1px solid #444;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888888' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
            padding-right: 40px;
            transition: border-color 0.2s;
        }

        select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 13px;
            color: #e0e0e0;
            text-transform: uppercase;
            font-weight: bold;
        }

        .checkbox-label input {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
        }
        
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        textarea { 
            width: 100%; 
            height: 120px; 
            background-color: var(--bg-input); 
            border: 1px solid #333; 
            color: #fff; 
            padding: 15px; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .output-wrapper { 
            background-color: #000; 
            padding: 20px; 
            border-radius: 8px; 
            width: 100%; 
            box-sizing: border-box; 
            border: 2px solid #222;
        }
        
        canvas { 
            display: block; 
            width: 100%; 
        }
        
        .btn-download { 
            background-color: var(--accent); 
            color: white; 
            border: none; 
            padding: 16px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 15px;
            text-transform: uppercase; 
            letter-spacing: 1px;
            border-radius: 6px; 
            cursor: pointer; 
            transition: background 0.2s, transform 0.1s;
        }
        
        .btn-download:hover { background-color: #e01b1b; }
        .btn-download:active { transform: scale(0.99); }
        
        .footer { 
            margin-top: 30px; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .footer-line1 {
            font-family: 'Keposhka', sans-serif;
            font-size: 20px;
            color: #666;
        }

        .footer-line2 {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 11px;
            color: #444;
        }
    </style>
</head>
<body>
<div class="container">
    <div>
        <h1>Keposhka Creator & Studio</h1>
        <div class="subtitle">The Official Tooling of Draag</div>
    </div>
    
    <div class="workspace">
        <div class="controls">
            <div class="control-group">
                <label>Ink Color</label>
                <div class="color-wheel-box">
                    <div class="color-circle-preview" id="colorPreview"></div>
                    <input type="color" id="inkColor" value="#ff2a2a">
                </div>
            </div>
            <div class="control-group">
                <label>Font Size</label>
                <input type="range" id="scale" min="20" max="100" value="50">
            </div>
            <div class="control-group">
                <label>Text Alignment</label>
                <select id="textAlign">
                    <option value="center" selected>Center</option>
                    <option value="left">Left</option>
                    <option value="right">Right</option>
                </select>
            </div>
            <div class="control-group" style="margin-top: 5px;">
                <label class="checkbox-label">
                    <input type="checkbox" id="boldToggle"> Extra Thick Bold
                </label>
            </div>
        </div>
        
        <div class="main-panel">
            <textarea id="englishInput" placeholder="Enter translation here...">LONG LIVE THE BLACK PARADE&#10;ASHTON AND DANIEL</textarea>
            
            <div class="output-wrapper" id="canvasContainer">
                <canvas id="studioCanvas"></canvas>
            </div>
            
            <button class="btn-download" id="downloadBtn">💾 Export Graphic (PNG)</button>
        </div>
    </div>
    
    <div class="footer">
        <div class="footer-line1">Na Na Na Na Na</div>
        <div class="footer-line2">Version 6.0</div>
    </div>
</div>

<script>
    const input = document.getElementById('englishInput');
    const canvas = document.getElementById('studioCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvasContainer');
    const scaleInput = document.getElementById('scale');
    const colorInput = document.getElementById('inkColor');
    const colorPreview = document.getElementById('colorPreview');
    const alignSelect = document.getElementById('textAlign');
    const boldCheckbox = document.getElementById('boldToggle');

    function renderStudio() {
        const text = input.value.toUpperCase();
        const fontSize = parseInt(scaleInput.value);
        const alignment = alignSelect.value;
        const isBold = boldCheckbox.checked;
        const padding = 20;
        
        // Match the live UI preview color to the underlying system input value
        colorPreview.style.backgroundColor = colorInput.value;

        // Tighter text layout engine boundaries to stop mobile screen line-clipping
        const availableWidth = wrapper.clientWidth - (padding * 2) - 20;
        canvas.width = wrapper.clientWidth - (padding * 2);

        ctx.font = `${fontSize}px Keposhka, sans-serif`;
        
        const paragraphs = text.split('\n');
        let lines = [];

        paragraphs.forEach(paragraph => {
            const words = paragraph.split(' ');
            let currentLine = '';

            for (let i = 0; i < words.length; i++) {
                if (words[i] === '' && i > 0) continue; 
                
                let testLine = currentLine + (currentLine === '' ? '' : ' ') + words[i];
                let metrics = ctx.measureText(testLine);
                
                if (metrics.width > availableWidth && i > 0) {
                    lines.push(currentLine);
                    currentLine = words[i];
                } else {
                    currentLine = testLine;
                }
            }
            lines.push(currentLine);
        });

        const lineHeight = fontSize * 1.3;
        canvas.height = (lines.length * lineHeight) + (padding * 2);

        // Render Background
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.font = `${fontSize}px Keposhka, sans-serif`;
        ctx.textBaseline = 'top';
        ctx.fillStyle = colorInput.value;

        let curY = padding;
        lines.forEach(line => {
            let lineMetrics = ctx.measureText(line);
            let drawX = padding; 

            if (alignment === 'center') {
                drawX = padding + (availableWidth - lineMetrics.width) / 2;
            } else if (alignment === 'right') {
                drawX = padding + (availableWidth - lineMetrics.width);
            }

            ctx.fillText(line, drawX, curY);
            
            if (isBold) {
                ctx.fillText(line, drawX + 1, curY);
                ctx.fillText(line, drawX, curY + 1);
            }
            
            curY += lineHeight;
        });
    }

    function checkFontAndRender() {
        if (document.fonts.check('12px Keposhka')) {
            renderStudio();
        } else {
            requestAnimationFrame(checkFontAndRender);
        }
    }

    document.fonts.ready.then(() => {
        checkFontAndRender();
    });

    ['input', 'change'].forEach(evt => {
        document.body.addEventListener(evt, renderStudio);
    });
    window.addEventListener('resize', renderStudio);
    
    document.getElementById('downloadBtn').onclick = () => {
        let rawName = input.value.trim().split('\n')[0] || 'keposhka';
        let cleanName = rawName.toLowerCase().replace(/[^a-z0-9_-]/g, '_').substring(0, 50);
        
        if (!cleanName || cleanName === '_') cleanName = 'keposhka_design';

        const link = document.createElement('a'); 
        link.download = `${cleanName}.png`; 
        link.href = canvas.toDataURL('image/png'); 
        link.click();
    };
</script>
</body>
</html>
